<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Agent Ferry 浏览器插件 Logo 候选评审板</title>
  <desc id="desc">Ferry Gate、Ferry Monogram 与 Folded Handoff 三个候选在插件图标、小尺寸、单色和浏览器工具栏中的表现。</desc>
  <defs>
    <symbol id="gate" viewBox="0 0 128 128">
      <rect x="4" y="4" width="120" height="120" rx="28" fill="#3867E8"/>
      <path d="M48 32H37c-8.284 0-15 6.716-15 15v34c0 8.284 6.716 15 15 15h11" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
      <rect x="94" y="31" width="12" height="66" rx="6" fill="#fff"/>
      <rect x="50" y="54" width="39" height="20" rx="7" fill="#F06B3C"/>
    </symbol>
    <symbol id="monogram" viewBox="0 0 128 128">
      <rect x="4" y="4" width="120" height="120" rx="28" fill="#3867E8"/>
      <path d="M26 38c0-6.627 5.373-12 12-12h57c6.627 0 12 5.373 12 12S101.627 50 95 50H51v14h29c6.627 0 12 5.373 12 12S86.627 88 80 88H51v18H26V38Z" fill="#fff"/>
      <rect x="94" y="65" width="20" height="20" rx="6" fill="#F06B3C"/>
    </symbol>
    <symbol id="page" viewBox="0 0 128 128">
      <rect x="4" y="4" width="120" height="120" rx="28" fill="#3867E8"/>
      <path d="M34 96V33c0-5.523 4.477-10 10-10h31l19 19v12M75 24v19h18M34 96h35" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M53 69h54M91 54l16 15-16 15" fill="none" stroke="#F06B3C" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="gate-mono" viewBox="0 0 100 100">
      <path d="M35 22h-7a9 9 0 0 0-9 9v38a9 9 0 0 0 9 9h7" fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
      <rect x="72" y="22" width="10" height="56" rx="5" fill="currentColor"/>
      <rect x="36" y="42" width="31" height="16" rx="6" fill="currentColor"/>
    </symbol>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#101828" flood-opacity=".09"/>
    </filter>
  </defs>

  <rect width="1200" height="820" fill="#F3F5F8"/>
  <text x="64" y="76" fill="#151922" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="-1.8">Agent Ferry · Browser Extension Logo</text>
  <text x="64" y="112" fill="#697180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">Round 01 shortlist · 16 px first · single-color capable · no AI cliché</text>

  <g transform="translate(64 154)">
    <g filter="url(#shadow)">
      <rect width="330" height="448" rx="24" fill="#fff"/>
    </g>
    <rect x="22" y="22" width="108" height="28" rx="14" fill="#E9EEFF"/>
    <text x="76" y="41" text-anchor="middle" fill="#3867E8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="750">RECOMMENDED</text>
    <use href="#gate" x="94" y="76" width="142" height="142"/>
    <text x="24" y="260" fill="#151922" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700">01 Ferry Gate</text>
    <text x="24" y="290" fill="#697180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">交接语义最完整，轮廓最稳定</text>
    <g transform="translate(24 322)">
      <use href="#gate" width="16" height="16"/>
      <use href="#gate" x="42" y="-8" width="32" height="32"/>
      <use href="#gate" x="100" y="-16" width="48" height="48"/>
      <text x="0" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">16</text>
      <text x="48" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">32</text>
      <text x="116" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">48</text>
      <rect x="190" y="-18" width="48" height="48" rx="12" fill="#151922"/>
      <g color="#fff"><use href="#gate-mono" x="198" y="-10" width="32" height="32"/></g>
      <g color="#151922"><use href="#gate-mono" x="262" y="-10" width="32" height="32"/></g>
      <text x="196" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">REV</text>
      <text x="263" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">MONO</text>
    </g>
  </g>

  <g transform="translate(435 154)">
    <g filter="url(#shadow)"><rect width="330" height="448" rx="24" fill="#fff"/></g>
    <text x="24" y="43" fill="#697180" font-family="ui-monospace, monospace" font-size="12" font-weight="700">LETTERFORM-AS-SYMBOL</text>
    <use href="#monogram" x="94" y="76" width="142" height="142"/>
    <text x="24" y="260" fill="#151922" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700">02 Ferry Monogram</text>
    <text x="24" y="290" fill="#697180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">品牌记忆最强，产品语义较隐性</text>
    <g transform="translate(24 322)">
      <use href="#monogram" width="16" height="16"/>
      <use href="#monogram" x="42" y="-8" width="32" height="32"/>
      <use href="#monogram" x="100" y="-16" width="48" height="48"/>
      <text x="0" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">16</text>
      <text x="48" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">32</text>
      <text x="116" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">48</text>
      <text x="190" y="8" fill="#151922" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="650">A–</text>
      <text x="190" y="30" fill="#697180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11">16px 负形拥挤</text>
    </g>
  </g>

  <g transform="translate(806 154)">
    <g filter="url(#shadow)"><rect width="330" height="448" rx="24" fill="#fff"/></g>
    <text x="24" y="43" fill="#697180" font-family="ui-monospace, monospace" font-size="12" font-weight="700">LITERAL / HANDOFF</text>
    <use href="#page" x="94" y="76" width="142" height="142"/>
    <text x="24" y="260" fill="#151922" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700">03 Folded Handoff</text>
    <text x="24" y="290" fill="#697180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">浏览器语义最直观，扩展性较窄</text>
    <g transform="translate(24 322)">
      <use href="#page" width="16" height="16"/>
      <use href="#page" x="42" y="-8" width="32" height="32"/>
      <use href="#page" x="100" y="-16" width="48" height="48"/>
      <text x="0" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">16</text>
      <text x="48" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">32</text>
      <text x="116" y="58" fill="#9098A7" font-family="ui-monospace, monospace" font-size="10">48</text>
      <text x="190" y="8" fill="#151922" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="650">B</text>
      <text x="190" y="30" fill="#697180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11">折角在 16px 丢失</text>
    </g>
  </g>

  <g transform="translate(64 646)">
    <text y="-18" fill="#697180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="650">CHROME TOOLBAR SIMULATION · LIGHT / DARK</text>
    <rect width="1072" height="112" rx="20" fill="#fff" stroke="#DCE1E8"/>
    <circle cx="34" cy="34" r="6" fill="#F06B5E"/><circle cx="54" cy="34" r="6" fill="#F6C450"/><circle cx="74" cy="34" r="6" fill="#55C57A"/>
    <rect x="122" y="17" width="586" height="34" rx="17" fill="#F1F3F6"/>
    <text x="145" y="39" fill="#858D9A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">agentferry.local / current-page</text>
    <use href="#gate" x="1010" y="18" width="32" height="32"/>
    <rect x="738" y="0" width="334" height="112" rx="20" fill="#151922"/>
    <rect x="760" y="17" width="190" height="34" rx="17" fill="#252B36"/>
    <use href="#gate" x="1010" y="18" width="32" height="32"/>
    <text x="24" y="88" fill="#697180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">推荐：彩色商店图标使用蓝色底板；Chrome 工具栏可直接复用，或使用纯单色 Ferry Gate。</text>
  </g>
</svg>
