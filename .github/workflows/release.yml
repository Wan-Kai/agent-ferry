name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "源码中的 SemVer；手动运行只生成 RC 产物，不创建 GitHub Release"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: Homebrew macOS release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$ ]]; then
            echo "无效发行版本：${version}" >&2
            exit 2
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
          targets: aarch64-apple-darwin,x86_64-apple-darwin
          components: clippy,rustfmt
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm --prefix extension ci
      - name: Verify source and extension identity
        run: |
          "$(./scripts/find-node)" scripts/check-release-version.mjs "${{ steps.release.outputs.version }}"
          "$(./scripts/find-node)" scripts/extension-identity.mjs release/chrome-extension-identity.json
          ./scripts/verify --require-clean
      - name: Build both macOS architectures
        run: |
          ./scripts/build-macos-release \
            --version "${{ steps.release.outputs.version }}" \
            --output-dir target/release-binaries
      - name: Package Homebrew and Chrome artifacts
        run: |
          mkdir -p target/distribution target/release-evidence
          ./scripts/package-homebrew-release \
            --version "${{ steps.release.outputs.version }}" \
            --arm64-bin-dir target/release-binaries/arm64 \
            --x86_64-bin-dir target/release-binaries/x86_64 \
            --output-dir target/distribution \
            --base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${{ steps.release.outputs.version }}" \
            --extension-identity release/chrome-extension-identity.json
          ./scripts/package-chrome-extension \
            --extension-identity release/chrome-extension-identity.json \
            --output-dir target/distribution
      - name: Bind verification evidence to artifacts
        run: |
          evidence_args=(
            --require-clean
            --evidence target/release-evidence/verification.json
            --artifact target/distribution/agent-ferry-v${{ steps.release.outputs.version }}-darwin-arm64.tar.gz
            --artifact target/distribution/agent-ferry-v${{ steps.release.outputs.version }}-darwin-x86_64.tar.gz
            --artifact target/distribution/agent-ferry-extension-v${{ steps.release.outputs.version }}-chrome.zip
            --artifact target/distribution/agent-ferry.rb
            --artifact target/distribution/checksums.txt
          )
          ./scripts/verify "${evidence_args[@]}"
      - uses: actions/attest-build-provenance@v3
        if: github.ref_type == 'tag'
        with:
          subject-path: |
            target/distribution/agent-ferry-v${{ steps.release.outputs.version }}-darwin-arm64.tar.gz
            target/distribution/agent-ferry-v${{ steps.release.outputs.version }}-darwin-x86_64.tar.gz
            target/distribution/agent-ferry-extension-v${{ steps.release.outputs.version }}-chrome.zip
            target/distribution/agent-ferry.rb
      - uses: actions/upload-artifact@v4
        with:
          name: agent-ferry-v${{ steps.release.outputs.version }}-release-candidate
          if-no-files-found: error
          path: |
            target/distribution/
            target/release-evidence/
      - name: Publish immutable GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            target/distribution/agent-ferry-v${{ steps.release.outputs.version }}-darwin-arm64.tar.gz \
            target/distribution/agent-ferry-v${{ steps.release.outputs.version }}-darwin-x86_64.tar.gz \
            target/distribution/agent-ferry-extension-v${{ steps.release.outputs.version }}-chrome.zip \
            target/distribution/agent-ferry.rb \
            target/distribution/checksums.txt \
            --verify-tag \
            --generate-notes \
            --title "Agent Ferry ${GITHUB_REF_NAME}"
      - uses: actions/checkout@v7
        if: github.ref_type == 'tag'
        with:
          repository: Wan-Kai/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: target/homebrew-tap
      - name: Publish Formula to Homebrew tap
        if: github.ref_type == 'tag'
        run: |
          mkdir -p target/homebrew-tap/Formula
          cp target/distribution/agent-ferry.rb target/homebrew-tap/Formula/agent-ferry.rb
          cd target/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-ferry.rb
          git commit -m "agent-ferry ${{ steps.release.outputs.version }}"
          git push origin HEAD:main
